<!DOCTYPE html>
<!--
  Page de test MINIMALE, sans aucun rapport avec le reste d'Harmonize —
  aucun Supabase, aucun compte, aucun cache anti-spoiler, aucun bandeau,
  aucun minuteur, rien. Juste l'API IFrame YouTube toute nue, avec les
  mêmes vraies chansons du pool communautaire, une vidéo visible de taille
  normale, en autoplay (comme le fait Harmonize). But : savoir si "pub à
  presque chaque chanson" se reproduit même dans le cas le plus simple
  possible d'intégration YouTube — ou si c'est spécifique à quelque chose
  dans le reste du code d'Harmonize.
  21/07/2026 — à supprimer une fois le test terminé, pas une vraie page de l'app.
-->
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Test minimal — lecture YouTube</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0f0d17; color: #fff; text-align: center; padding: 24px 16px; }
  h1 { font-size: 20px; }
  p { color: #aaa; font-size: 14px; }
  #player { margin: 20px auto; }
  button { font-size: 16px; padding: 12px 20px; border-radius: 10px; border: none; background: #8b5cf6; color: #fff; margin-top: 16px; cursor: pointer; }
  #status { margin-top: 14px; font-size: 13px; color: #8b5cf6; }
</style>
</head>
<body>
  <h1>Test minimal — lecture YouTube</h1>
  <p>Aucun rapport avec le reste d'Harmonize : pas de compte, pas de base de données, pas de code caché. Juste l'API YouTube toute seule, avec les mêmes vraies chansons du pool.</p>
  <div id="player"></div>
  <p id="status">Chanson 1 / 6</p>
  <button onclick="nextVideo()">▶️ Chanson suivante</button>

  <script>
    // Un échantillon de vraies chansons du pool communautaire d'Harmonize
    // (mêmes vidéos que dans l'app), pour comparer sur le même contenu.
    const VIDEOS = [
      { id: "D38EUIll1pM", title: "Amel Bent - Ma philosophie" },
      { id: "lgHGU8gqz9U", title: "France Gall - Ella, elle l'a" },
      { id: "voQhp1K2TSk", title: "Trois Cafés Gourmands - À nos souvenirs" },
      { id: "_YqzuE-5RE8", title: "Renaud - Mistral gagnant" },
      { id: "80hMEKlLVgQ", title: "Manau - La tribu de Dana" },
      { id: "yTzyJ7kDLL4", title: "Début de Soirée - Nuit de Folie" },
    ];
    let currentIndex = 0;
    let player = null;

    let ytApiReady = false;
    function onYouTubeIframeAPIReady(){
      ytApiReady = true;
      player = new YT.Player("player", {
        height: "200", width: "320",
        videoId: VIDEOS[0].id,
        playerVars: { autoplay: 1, playsinline: 1, rel: 0 },
      });
    }
    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function nextVideo(){
      currentIndex = (currentIndex + 1) % VIDEOS.length;
      document.getElementById("status").textContent = `Chanson ${currentIndex + 1} / ${VIDEOS.length} — ${VIDEOS[currentIndex].title}`;
      if(player && player.loadVideoById){
        player.loadVideoById(VIDEOS[currentIndex].id);
      }
    }
  </script>
</body>
</html>
